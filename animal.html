<!DOCTYPE html>
<html>
  <head>
    <title>Artemals - Mon Animal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>

    <main>
      <h1>Mon animal 🐾</h1>
      <p>Remplissez le profil de votre animal relié à son QR code</p>

      <form>
        <label>Nom de l'animal</label><br>
        <input type="text" placeholder="Ex : Manu"><br><br>

        <label>Espèce</label><br>
        <select>
          <option>Chien</option>
          <option>Chat</option>
          <option>Autre</option>
        </select><br><br>

        <label>Race</label><br>
        <input type="text" placeholder="Ex : Labrador"><br><br>

        <label>Âge</label><br>
        <input type="number" placeholder="Ex : 3"><br><br>

        <label>Couleur</label><br>
        <input type="text" placeholder="Ex : Marron"><br><br>

        <label>Maladies ou traitements</label><br>
        <textarea placeholder="Ex : Allergique aux arachides..."></textarea><br><br>

        <label>Photo de l'animal</label><br>
        <input type="file" accept="image/*"><br><br>

        <label>Votre numéro de contact</label><br>
        <input type="tel" placeholder="+689 87 12 34 56"><br><br>

        <button type="submit">Enregistrer mon animal</button>
      </form>
    </main>

    <nav>
      <a href="index.html">🏠 Accueil</a>
      <a href="carte.html">🗺️ Cartes</a>
      <a href="annonces.html">📢 Annonces</a>
      <a href="services.html">🐾 Services</a>
      <a href="animal.html">🏷️ Mon animal</a>
      <a href="profil.html">👤 Profil</a>
    </nav>

  </body>
</html>
