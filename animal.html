<!DOCTYPE html>
<html>
  <head>
    <title>Artemals - Mon Animal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>

    <main>
      <h1>Mon animal 🐾</h1>
      <p>Remplissez le profil de votre animal relié à son QR code</p>

      <form>
        <div>
         <label>Nom de l'animal</label>
         <input type="text" placeholder="Ex : Manu">
          
        <div>
         <label>Espèce</label>
         <select>
          <option>Chien</option>
          <option>Chat</option>
          <option>Autre</option>
        </select>
       </div>
       <div>
        <label>Race</label>
        <input type="text" placeholder="Ex : Labrador">
       </div>
       <div>  
        <label>Âge</label>
        <input type="number" placeholder="Ex : 3">
       </div>
       <div>
        <label>Couleur</label>
        <input type="text" placeholder="Ex : Marron">
       </div>
       <div>
        <label>Maladies ou traitements</label>
        <textarea placeholder="Ex : Allergique aux arachides..."></textarea>
       </div>
       <div>
        <label>Photo de l'animal</label>
        <input type="file" accept="image/*">
       </div>
       <div>
        <label>Votre numéro de contact</label>
        <input type="tel" placeholder="+689 87 12 34 56">
       </div>
         
        <button type="submit">Enregistrer mon animal</button>
      </form>
    </main>

    <nav>
      <a href="index.html">🏠 Accueil</a>
      <a href="carte.html">🗺️ Cartes</a>
      <a href="annonces.html">📢 Annonces</a>
      <a href="services.html">🐾 Services</a>
      <a href="animal.html">🏷️ Mon animal</a>
      <a href="profil.html">👤 Profil</a>
    </nav>

  </body>
</html>
