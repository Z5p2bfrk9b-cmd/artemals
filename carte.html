<body>
 <main>
  <h1>Carte 🗺️</h1>
  <p>Vous voulez voir les animaux qui on été signaler, rendez-vouz en dessous!!</p>
  
  <h2>Signaler un animal</h2>
   <form>
     <div>
       <label>Type d'animals</label>
       <select>
         <option>Chien</option>
         <option>Chat</option>
         <option>Autres</option>
         <option>Zone à chiens</option>
       </select>
     </div>
     <div>
       <label>Description</label>
       <textarea placeholder="Décrivez ce que vous avez vu..."></textarea>
     </div>
     <div>
       <label>Votre zone</label>
       <input type="text" placeholder="Ex : Papeete, Route de Faa'a">
     </div>
      <button type="submit">Envoyer le signalement</button>
    </form>

    <h2>Carte de Tahiti</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d238605.86660253497!2d-149.9442216!3d-17.6509!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x76c0dcb7362cb0e3%3A0x8081828126dde57b!2sTahiti!5e0!3m2!1sfr!2spf!4v1718900000000!5m2!1sfr!2spf"
      width="100%"
      height="400"
      style="border:0;"
      allowfullscreen=""
      loading="lazy">
    </iframe>
  
</main>
