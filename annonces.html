<!DOCTYPE html>
<html>
<head>
<title>Artemals-Annonces</title> 
 <link rel="stylesheet" href="style.css">
 <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
 <main>
   <h1>Annonces 📢</h1>
   <p>Signalez un animal perdu, trouvé</p>
  
   <h2>Poster une annonce</h2>
   <form>
     <div>
       <label>Nom de l'animal</label>
       <input type="text" placeholder="Ex : Manu">
     </div>
     <div>
       <label>Espèce</label>
       <select>
         <option>Chien</option>
         <option>Chat</option>
         <option>Autre</option>
       </select>
     </div>
     <div>
       <label>Statut</label>
       <select>
         <option>Perdu</option>
         <option>Trouvé</option>
       </select>
     </div>
     <div>
       <label>Zone</label>
       <input type="text" placeholder="Ex : Papeete, Pirae">
     </div>
     <div>
       <label>Description</label>
       <textarea placeholder="Couleur, taille, signes particuliers..."></textarea>
     </div>
     <div>
       <label>Votre contact</label>
       <input type="tel" placeholder="Ex : +689 87 12 34 56">
     </div>
      <button type="submit">Publier l'annonce</button>
    </form>
 </main>

 </nav> 
 
</body> 
</html>
