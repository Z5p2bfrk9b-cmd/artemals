<body>
 <main>
   <h1>Annonces 📢</h1>
   <p>Signalez un animal perdu, trouvé</p>
   <h2>Poster une annonce</h2>
   <form>
    <label>Nom de l'animal</label><br>
    <input type="text" placeholder="Ex : Manu"><br><br>
   
    <label>Espèce</label><br>
    <select>
     <option>Chien</option>
     <option>Chat</option>
     <option>Autre</option
    </select><br><br>

    
    <label>Statut</label>
    <select>
     <option>Perdu</option>
     <option>Retrouver</option>
    </select>

    <label>Zone</label><br>
    <input type="text" placeholder="Ex : Papeete, Pirae"><br><br>

    <label>Description</label><br>
    <textarea placeholder="Couleur, taille, signes particuliers ..."></textarea><br><br>

    <label>Votre contact</label><br>
    <input type="tel" placeholder="Ex : +689 87 12 34 56"><br><br>

    <button type="submit">Publier l'annonce</button>
   </form>
 </main>
